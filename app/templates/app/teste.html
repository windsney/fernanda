<!DOCTYPE html>
<html>
<head>
    <title>Mapa Mato Grosso</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; width: 100%; border: 1px solid #ccc; }
    </style>
</head>
<body>
    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/topojson-client@3"></script>

    <script>
        const map = L.map('map').setView([-12.64, -55.42], 6);

        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

        fetch('MT_Municipios_2022.json')
            .then(res => res.json())
            .then(data => {
                console.log("Arquivo carregado:", data); // Para você ver no F12 se carregou

                // A mágica acontece aqui: convertendo TopoJSON para GeoJSON
                // O nome 'MT_Municipios_2022' DEVE ser idêntico ao que está dentro do seu JSON
                const municipios = topojson.feature(data, data.objects.MT_Municipios_2022);

                L.geoJson(municipios, {
                    style: {
                        color: "#ffffff",   // Linhas brancas para dividir
                        weight: 1,          // Espessura da linha
                        fillColor: "#005da4",
                        fillOpacity: 0.4
                    },
                    onEachFeature: function(feature, layer) {
                        // NM_MUN é o nome da cidade no seu arquivo
                        layer.bindPopup("<b>Município:</b> " + feature.properties.NM_MUN);
                    }
                }).addTo(map);
            })
            .catch(err => alert("Erro ao carregar o arquivo: " + err));
    </script>
</body>
</html>
